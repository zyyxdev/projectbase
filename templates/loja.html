{% extends "base.html" %}
{% block title %}Loja{% endblock %}
{% block page_title %}Loja{% endblock %}
{% block content %}
<div class="topbar-actions">
    <a href="{{ url_for('carrinho_view') }}" class="btn-carrinho"><i class="fas fa-shopping-cart"></i> Carrinho</a>
</div>
<div class="loja-grid">
    {% for p in produtos %}
    <div class="produto-card">
        <i class="fas {{ p.icone }}"></i>
        <h4>{{ p.nome }}</h4>
        <p style="color:#8b9bb5;font-size:0.8rem;">{{ p.desc }}</p>
        <div class="preco">R$ {{ "%.2f"|format(p.preco) }}</div>
        <a href="{{ url_for('adicionar_carrinho', produto_id=p.id) }}" class="btn-comprar">Adicionar ao carrinho</a>
    </div>
    {% endfor %}
</div>
{% endblock %}
